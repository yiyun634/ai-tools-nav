<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>币安广场 - AI技能工坊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #0f0f0f; color: #fff; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .back { color: #667eea; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 30px; }
        .card { background: #1a1a1a; border-radius: 20px; padding: 40px; }
        .tags { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .tag { background: #2a2a2a; padding: 6px 16px; border-radius: 20px; color: #667eea; }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        .subtitle { color: #999; margin-bottom: 30px; }
        .section { margin: 30px 0; }
        .section h2 { font-size: 1.2rem; color: #667eea; margin-bottom: 15px; }
        .features { list-style: none; }
        .features li { padding: 10px 0; border-bottom: 1px solid #2a2a2a; }
        .features li:before { content: "✅ "; }
        .install-box { background: #0d0d0d; border: 1px solid #333; border-radius: 12px; padding: 20px; margin: 20px 0; }
        .install-title { color: #667eea; margin-bottom: 15px; font-size: 1.1rem; }
        .code { background: #1a1a1a; padding: 15px 20px; border-radius: 8px; font-family: monospace; color: #4ade80; font-size: 1rem; margin: 10px 0; }
        .note { background: #1a1a1a; border-left: 3px solid #667eea; padding: 15px; margin: 15px 0; color: #999; }
        .btn { display: inline-block; background: #667eea; color: #fff; padding: 12px 30px; border-radius: 10px; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← 返回首页</a>
        <div class="card">
            <h1>🟡 币安广场</h1>
            <p class="subtitle">币安官方社区内容发布与互动平台</p>
            <div class="tags">
                <span class="tag">Binance</span>
                <span class="tag">社区</span>
                <span class="tag">发帖</span>
            </div>
            <div class="install-box">
                <div class="install-title">📦 安装命令</div>
                <div class="code">clawhub install binance-square</div>
            </div>
            <div class="section">
                <h2>📋 功能介绍</h2>
                <ul class="features">
                    <li>在币安Square发布内容</li>
                    <li>与币圈用户互动</li>
                    <li>项目推广与社区建设</li>
                    <li>多账号管理</li>
                </ul>
            </div>
            <div class="note">
                💡 安装后，描述你要发布的内容，AI会帮你完成发布
            </div>
            <a href="/" class="btn">← 返回首页</a>
        </div>
    </div>
</body>
</html>
