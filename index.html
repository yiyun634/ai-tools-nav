  search:"🔍 搜索AI工具...",

 },
 en: {
  search:"🔍 Search AI tools...",
  cats:{"ai-agent":"🤖 AI Agents","ai-chat":"💬 AI Chat","ai-image":"🎨 AI Image","ai-video":"🎬 AI Video","ai-voice":"🎵 AI Audio","ai-rag":"📚 RAG","ai-workflow":"⚙️ Workflow","ai-local":"💻 Local LLM","ai-framework":"🔧 Framework","ai-prompt":"📝 Prompt","ai-api":"🔌 API","ai-search":"🔍 Scraping","ai-crypto":"💰 Crypto","ai-code":"💻 Coding","tutorials":"📚 Tutorials","learning":"🎓 Learning","cloud":"☁️ Cloud","productivity":"🛠️ Productivity","money":"💵 Money","webdev":"🌐 Web Dev","scripts":"⚡ Scripts"}
 }
};

function initPage() {
 var grouped = {};
 allTools.forEach(function(t) {
  if(!grouped[t.category]) grouped[t.category] = [];
  grouped[t.category].push(t);
 });
 
 var catNames = langData[currentLang].cats;
 var html = '';
 Object.keys(grouped).forEach(function(cid) {
  var tools = grouped[cid];
  var catName = catNames[cid] || cid;
  html += '<div class="category" id="'+cid+'"><h2><span class="icon">'+catName.split(' ')[0]+'</span> '+catName+' ('+tools.length+'个)</h2><div class="tools-grid">';
  tools.forEach(function(t) {
   html += '<div class="tool-card" onclick="showModal(\''+t.name.replace(/'/g,"\\'")+'\')"><h3>'+t.name+'</h3><div class="stars">⭐ '+(t.stars>=1000?Math.round(t.stars/1000)+'k':t.stars)+'</div><p>'+t.desc.substring(0,80)+'...</p><span class="install" onclick="event.stopPropagation();showInstall(\''+t.name.replace(/'/g,"\\'")+'\')">⚡ 查看详情</span></div>';
  });
  html += '</div></div>';
 });
 
 document.getElementById('toolsContainer').innerHTML = html;
 document.getElementById('totalCount').textContent = allTools.length + '个工具';
}

function showModal(name) {
 var t = allTools.find(function(x){return x.name===name});
 if(!t) return;
 currentModalTool = t;
 
 document.getElementById('modalTitle').textContent = t.name;
 document.getElementById('modalStars').textContent = '⭐ ' + (t.stars>=1000?Math.round(t.stars/1000)+'k':t.stars);
 document.getElementById('modalDesc').textContent = t.desc;
 document.getElementById('modalInstall').textContent = t.install;
 document.getElementById('modalTutorial').textContent = t.tutorial;
 
 var catNames = langData[currentLang].cats;
 var catName = catNames[t.category] || t.category;
 document.getElementById('modalTags').innerHTML = '<span class="tag">'+catName+'</span>';
 
 document.getElementById('toolModal').style.display = 'block';
}

function showInstall(name) {
 showModal(name);
}

function copyToClipboard(el) {
 navigator.clipboard.writeText(el.textContent).then(function() {
  alert('已复制到剪贴板！');
 });
}

function copyInstallCmd() {
 if(currentModalTool) {
  navigator.clipboard.writeText(currentModalTool.install).then(function() {
   alert('安装命令已复制！');
  });
 }
}

function toggleDarkMode() {
 document.body.classList.toggle('dark-mode');
 localStorage.setItem('darkMode',document.body.classList.contains('dark-mode'));
}

function toggleLang() {
 currentLang = currentLang==='zh'?'en':'zh';
 document.getElementById('searchInput').placeholder = langData[currentLang].search;
 initPage();
}

function closeModal(){document.getElementById('toolModal').style.display='none'}
function closeFavModal(){document.getElementById('favModal').style.display='none'}
function closeSubmitModal(){document.getElementById('submitModal').style.display='none'}
function closeVoteModal(){document.getElementById('voteModal').style.display='none'}

function toggleFavorites(){document.getElementById('favModal').style.display='block';loadFavorites()}
function loadFavorites(){
 var f=JSON.parse(localStorage.getItem('favorites')||'[]'),l=document.getElementById('favList');
 l.innerHTML=f.length===0?'<p style="text-align:center;color:#64748b;padding:30px">还没有收藏任何工具</p>':f.map(function(x){
  return'<div class="tool-card" style="cursor:default"><h3>'+x.name+'</h3><p>'+x.desc+'</p></div>';
 }).join('');
}
function addToFavoritesFromModal(){
 if(!currentModalTool) return;
 var f=JSON.parse(localStorage.getItem('favorites')||'[]');
 if(!f.some(function(x){return x.name===currentModalTool.name})){
  f.push({name:currentModalTool.name,desc:currentModalTool.desc.substring(0,50)});
  localStorage.setItem('favorites',JSON.stringify(f));
  alert('已添加到收藏！');
 }else{alert('已在收藏中');}
}

function voteToolFromModal() {
 if(!currentModalTool) return;
 var v=JSON.parse(localStorage.getItem('votes')||'{}');
 var name = currentModalTool.name;
 v[name]=(v[name]||0)+1;
 localStorage.setItem('votes',JSON.stringify(v));
 localStorage.setItem('voted_'+name,'true');
 alert('投票成功！');
}

function openSubmitModal(){document.getElementById('submitModal').style.display='block'}
function submitTool(e){
 e.preventDefault();
 var d={name:document.getElementById('toolName').value,desc:document.getElementById('toolDesc').value,install:document.getElementById('toolInstall').value,tutorial:document.getElementById('toolTutorial').value,date:new Date().toISOString()};
 var s=JSON.parse(localStorage.getItem('submissions')||'[]');
 s.push(d);
 localStorage.setItem('submissions',JSON.stringify(s));
 alert('感谢提交！');
 document.getElementById('submitForm').reset();
 closeSubmitModal();
}

function openVoteModal(){document.getElementById('voteModal').style.display='block';loadVotes()}
function loadVotes(){
 var v=JSON.parse(localStorage.getItem('votes')||'{}');
 var topTools = ['AutoGPT','Stable Diffusion WebUI','Dify','Ollama','LangChain'];
 var html = topTools.map(function(name){
  var t = allTools.find(function(x){return x.name===name});
  if(!t) return '';
  var c=v[name]||0;
  var voted=localStorage.getItem('voted_'+name);
  return'<div class="vote-item"><span class="vote-name">'+t.name+'</span><button class="vote-btn '+(voted?'voted':'')+'" onclick="voteToolByName(\''+name+'\')">⭐ '+c+' '+(voted?'已投票':'投票')+'</button></div>';
 }).join('');
 document.getElementById('voteList').innerHTML=html;
}
function voteToolByName(name){
 var v=JSON.parse(localStorage.getItem('votes')||'{}');
 v[name]=(v[name]||0)+1;
 localStorage.setItem('votes',JSON.stringify(v));
 localStorage.setItem('voted_'+name,'true');
 loadVotes();
}

function filterTools(){
 var i=document.getElementById('searchInput').value.toLowerCase();
 var c=document.getElementById('categoryFilter').value;
 document.querySelectorAll('.tool-card').forEach(function(cu){
  var p=cu.closest('.category'),n=p?p.id:'',t=cu.textContent.toLowerCase();
  cu.style.display=(t.includes(i)&&(c===''||n===c))?'block':'none';
 });
}

function sortTools(){
 var s=document.getElementById('sortSelect').value;
 if(s==='stars'){
  document.querySelectorAll('.category').forEach(function(cat){
   var g=cat.querySelector('.tools-grid'),c=Array.from(g.querySelectorAll('.tool-card'));
   c.sort(function(a,b){var x=parseInt(a.querySelector('.stars')?.textContent.replace(/[^0-9]/g,'')||'0'),y=parseInt(b.querySelector('.stars')?.textContent.replace(/[^0-9]/g,'')||'0');return y-x});
   c.forEach(function(el){g.appendChild(el)});
  });
 }
}

if(localStorage.getItem('darkMode')==='true')document.body.classList.add('dark-mode');
document.querySelector('.close').addEventListener('click',closeModal);
window.addEventListener('click',function(e){if(e.target==document.getElementById('toolModal'))closeModal()});

initPage();
</script>
</body>
</html>
