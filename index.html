// Group tools by category
var grouped = {};
allTools.forEach(function(t) {
 if(!grouped[t.category]) grouped[t.category] = [];
 grouped[t.category].push(t);
});

// Render
var html = '';
Object.keys(grouped).forEach(function(cid) {
 var tools = grouped[cid];
 var catName = (currentLang === 'zh' ? langData.zh.categories[cid] : langData.en.categories[cid]) || cid;
 html += '<div class="category" id="'+cid+'"><h2><span class="icon">'+catName.split(' ')[0]+'</span> '+catName+' ('+tools.length+'个)</h2><div class="tools-grid">';
 tools.forEach(function(t) {
  html += '<div class="tool-card" onclick="showModal(\''+t.name+'\')"><h3><a href="'+t.website+'" target="_blank" onclick="event.stopPropagation()">'+t.name+'</a></h3><div class="stars">⭐ '+(t.stars>=1000?Math.round(t.stars/1000)+'k':t.stars)+'</div><p>'+t.desc+'</p><span class="install">'+t.install+'</span></div>';
 });
 html += '</div></div>';
});

document.getElementById('toolsContainer').innerHTML = html;
document.getElementById('totalCount').textContent = allTools.length + '+工具';

// Modal functions
function showModal(name) {
 var t = allTools.find(function(x){return x.name===name});
 if(!t) return;
 document.getElementById('modalTitle').textContent = t.name;
 document.getElementById('modalStars').textContent = '⭐ ' + (t.stars>=1000?Math.round(t.stars/1000)+'k':t.stars);
 document.getElementById('modalDesc').textContent = t.desc;
 document.getElementById('modalInstall').textContent = t.install;
 document.getElementById('modalLink').href = t.website;
 document.getElementById('toolModal').style.display = 'block';
 currentModalName = t.name;
}

var currentModalName = '';

function closeModal(){document.getElementById('toolModal').style.display='none'}
function closeFavModal(){document.getElementById('favModal').style.display='none'}
function closeSubmitModal(){document.getElementById('submitModal').style.display='none'}
function closeVoteModal(){document.getElementById('voteModal').style.display='none'}

function toggleDarkMode(){document.body.classList.toggle('dark-mode');localStorage.setItem('darkMode',document.body.classList.contains('dark-mode'))}
function toggleLang(){
 currentLang = currentLang==='zh'?'en':'zh';
 document.getElementById('searchInput').placeholder = langData[currentLang].searchPlaceholder;
 var catMap = langData[currentLang].categories;
 document.querySelectorAll('.category').forEach(function(el){
  var id = el.id;
  var name = catMap[id] || id;
  el.querySelector('h2').innerHTML = '<span class="icon">'+name.split(' ')[0]+'</span> '+name+' ('+el.querySelectorAll('.tool-card').length+'个)';
 });
}

// Favorites
function toggleFavorites(){document.getElementById('favModal').style.display='block';loadFavorites()}
function loadFavorites(){
 var f=JSON.parse(localStorage.getItem('favorites')||'[]'),l=document.getElementById('favList');
 l.innerHTML=f.length===0?'<p style="text-align:center;color:#64748b;padding:30px">还没有收藏任何工具</p>':f.map(function(x){
  return'<div class="tool-card" style="cursor:default"><h3><a href="'+x.url+'" target="_blank">'+x.name+'</a></h3><p>'+x.desc+'</p></div>';
 }).join('');
}
function addToFavoritesFromModal(){
 var t = allTools.find(function(x){return x.name===currentModalName});
 if(!t) return;
 var f=JSON.parse(localStorage.getItem('favorites')||'[]');
 if(!f.some(function(x){return x.name===t.name})){
  f.push({name:t.name,url:t.website,desc:t.desc});
  localStorage.setItem('favorites',JSON.stringify(f));
  alert('已添加到收藏！');
 }else{alert('已在收藏中');}
}

// Submit
function openSubmitModal(){document.getElementById('submitModal').style.display='block'}
function submitTool(e){
 e.preventDefault();
 var d={name:document.getElementById('toolName').value,url:document.getElementById('toolUrl').value,desc:document.getElementById('toolDesc').value,install:document.getElementById('toolInstall').value,date:new Date().toISOString()};
 var s=JSON.parse(localStorage.getItem('submissions')||'[]');
 s.push(d);
 localStorage.setItem('submissions',JSON.stringify(s));
 alert('感谢提交！');
 document.getElementById('submitForm').reset();
 closeSubmitModal();
}

// Vote
function openVoteModal(){document.getElementById('voteModal').style.display='block';loadVotes()}
function loadVotes(){
 var v=JSON.parse(localStorage.getItem('votes')||'{}');
 var topTools = [
  {name:'AutoGPT',url:'https://news.agpt.co/'},
  {name:'Stable Diffusion WebUI',url:'https://github.com/AUTOMATIC1111/stable-diffusion-webui'},
  {name:'Dify',url:'https://dify.ai/'},
  {name:'Ollama',url:'https://ollama.com/'},
  {name:'LangChain',url:'https://www.langchain.com/'}
 ];
 var html = topTools.map(function(x){
  var c=v[x.url]||0;
  var voted=localStorage.getItem('voted_'+x.url);
  return'<div class="vote-item"><span class="vote-name">'+x.name+'</span><button class="vote-btn '+(voted?'voted':'')+'" onclick="voteTool(\\''+x.url+'\\')">⭐ '+c+' '+(voted?'已投票':'投票')+'</button></div>';
 }).join('');
 document.getElementById('voteList').innerHTML=html;
}
function voteTool(u){
 if(localStorage.getItem('voted_'+u)){alert('已经投过票了');return}
 var v=JSON.parse(localStorage.getItem('votes')||'{}');
 v[u]=(v[u]||0)+1;
 localStorage.setItem('votes',JSON.stringify(v));
 localStorage.setItem('voted_'+u,'true');
 loadVotes();
}

// Search
function filterTools(){
 var i=document.getElementById('searchInput').value.toLowerCase();
 var c=document.getElementById('categoryFilter').value;
 document.querySelectorAll('.tool-card').forEach(function(cu){
  var p=cu.closest('.category'),n=p?p.id:'',t=cu.textContent.toLowerCase();
  cu.style.display=(t.includes(i)&&(c===''||n===c))?'block':'none';
 });
}

// Init
if(localStorage.getItem('darkMode')==='true')document.body.classList.add('dark-mode');
document.querySelector('.close').addEventListener('click',closeModal);
window.addEventListener('click',function(e){if(e.target==document.getElementById('toolModal'))closeModal()});
</script>
